services:
  # 1. Database Service (MySQL)
  database:
    image: mysql:latest
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: test_db
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql

  # 2. Python API Backend Service
  backend:
    build: ./backend  # Looks inside the /backend folder for your Dockerfile
    container_name: flask-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=database
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=test_db
    depends_on:
      - database

  # 3. Web UI Frontend Service (Nginx)
  frontend:
    build: ./frontend  # Looks inside the /frontend folder for your Dockerfile
    container_name: web-frontend
    restart: always
    ports:
      - "8086:80"
    depends_on:
      - backend

# Named volume to ensure your user database isn't wiped if containers restart
volumes:
  db-data:
